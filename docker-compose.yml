version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: slh-postgres
    environment:
      POSTGRES_DB: slh_db
      POSTGRES_USER: slh_user
      POSTGRES_PASSWORD: slh_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: